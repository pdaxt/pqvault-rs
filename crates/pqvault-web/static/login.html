<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PQVault - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .logo .subtitle {
            color: #666;
            font-size: 0.85rem;
        }
        .login-card {
            background: #12121a;
            border: 1px solid #1e1e2e;
            border-radius: 12px;
            padding: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            color: #888;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #0a0a0f;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            color: #e0e0e0;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #00d4ff;
        }
        .login-btn {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            border: none;
            border-radius: 8px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .login-btn:hover { opacity: 0.9; }
        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .error-msg {
            background: rgba(255, 60, 60, 0.1);
            border: 1px solid rgba(255, 60, 60, 0.3);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }
        .error-msg.visible { display: block; }
        .security-note {
            text-align: center;
            margin-top: 1.5rem;
            color: #444;
            font-size: 0.75rem;
        }
        .security-note span {
            color: #00d4ff;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>PQVault</h1>
            <div class="subtitle">Quantum-Proof Secrets Manager</div>
        </div>
        <div class="login-card">
            <div class="error-msg" id="error"></div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="password">Master Password</label>
                    <input type="password" id="password" name="password"
                           placeholder="Enter vault master password"
                           autocomplete="current-password" autofocus required>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">Unlock Vault</button>
            </form>
        </div>
        <div class="security-note">
            Protected by <span>ML-KEM-768 + X25519</span> hybrid encryption
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const error = document.getElementById('error');
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.textContent = 'Authenticating...';
            error.classList.remove('visible');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await res.json();

                if (data.ok) {
                    window.location.href = '/';
                } else {
                    error.textContent = data.message;
                    error.classList.add('visible');
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            } catch (err) {
                error.textContent = 'Connection failed';
                error.classList.add('visible');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Unlock Vault';
            }
        }
    </script>
</body>
</html>
